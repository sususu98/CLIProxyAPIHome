name: dev-prerelease

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  packages: write

concurrency:
  group: dev-prerelease
  cancel-in-progress: false

jobs:
  publish:
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create development release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          release_tag="dev-$(date -u +%Y%m%d%H%M%S)-$(git rev-parse --short=12 HEAD)"
          git tag "$release_tag"
          git push origin "refs/tags/$release_tag"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  release:
    needs: publish
    uses: ./.github/workflows/release.yaml
    with:
      release_tag: ${{ needs.publish.outputs.release_tag }}
    secrets: inherit

  docker:
    needs: publish
    uses: ./.github/workflows/docker-image.yml
    with:
      release_tag: ${{ needs.publish.outputs.release_tag }}
    secrets: inherit
