# CLIProxyAPIHome cluster mode configuration.
# Copy this file to cluster.yaml to enable cluster behavior.
# PostgreSQL is recommended for multi-node deployments.
pgsql:
  host: "127.0.0.1"
  # When running PostgreSQL in docker compose, use the service/container name instead of 127.0.0.1.
  # host: "postgres"
  port: 5432
  user: "cliproxy"
  password: "secret"
  database: "cliproxy_home"
  sslmode: "disable"

# SQLite can also be used as the cluster database backend.
# To use SQLite, remove or comment the pgsql section, enable this section, and set node.external-ip below.
# sqlite:
#   path: "home.db"

node:
  # Optional public address advertised to other Home nodes and CPA clients.
  # external-ip: "203.0.113.10"
  # Optional public port advertised to other Home nodes and CPA clients when a reverse proxy changes the reachable port.
  # external-port: 443
  port: 8327
  heartbeat-interval: "5s"
  heartbeat-timeout: "20s"
  event-poll-interval: "3s"
